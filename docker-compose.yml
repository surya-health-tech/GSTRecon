services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gstrecon
    ports:
      - "5434:5432"
    volumes:
      - gst_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gstrecon"]
      interval: 3s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/gstrecon
      LOG_LEVEL: INFO
      FRONTEND_APP_URL: http://localhost:5175
      CORS_ORIGINS: http://localhost:5175,http://127.0.0.1:5175
    ports:
      - "8002:8000"
    volumes:
      - ./backend/data:/app/data
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        alembic upgrade head &&
        python -m app.scripts.seed_platform_admin &&
        exec uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5175:5173"
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"

volumes:
  gst_pg:
